<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VARTA — Генеральний штаб</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="../../../css/tokens.css?v=2" />
  <link rel="stylesheet" href="infrastructure.css?v=3" />

<body>

  <header class="topbar">
    <div class="topbar__left">
      <img class="topbar__logo" src="../../../assets/logo.webp" alt="VARTA" />
    </div>
    <div class="topbar__center">
      <h1 class="topbar__title">Генеральний штаб</h1>
    </div>
    <div class="topbar__right">
      <a class="btn-logout" href="../index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Назад
      </a>
    </div>
  </header>

  <main class="map-shell">
    <p class="map-error" id="mapError" hidden></p>
    <div id="map" class="map-root" role="application" aria-label="Інфраструктура на мапі"></div>
  </main>

  <script src="../../../js/api.js?v=2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
