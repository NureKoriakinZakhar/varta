<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VARTA — Діагнози</title>
  <link rel="stylesheet" href="../../css/tokens.css?v=3" />
  <link rel="stylesheet" href="../../css/lang-switcher.css?v=2" />
  <link rel="stylesheet" href="diagnoses.css?v=6" />
</head>
<body>

  <header class="topbar">
    <div class="topbar__left">
      <img class="topbar__logo" src="../../assets/logo.webp" alt="VARTA" />
    </div>
    <div class="topbar__center">
      <h1 class="topbar__title" id="pageTitle"></h1>
    </div>
    <div class="topbar__right">
      <div class="lang-switcher">
        <button type="button" class="lang-switcher__btn" data-lang="uk">UA</button>
        <button type="button" class="lang-switcher__btn" data-lang="en">EN</button>
      </div>
      <a class="btn-logout" href="../hospital/index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        <span id="backText">Назад</span>
      </a>
    </div>
  </header>

  <main class="main">
    <div class="content-layout">
      <section class="list-column" aria-labelledby="listHeading">
        <h2 class="visually-hidden" id="listHeading">Список діагнозів</h2>
        <div class="diagnoses-list" id="diagnosesList">
          <div class="skeleton-list" id="skeletonList">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>
        </div>
        <p class="empty-msg" id="emptyMsg" hidden>Діагнози відсутні</p>
        <p class="error-msg" id="listErrorMsg" hidden></p>
      </section>

      <aside class="add-panel" aria-labelledby="formHeading">
        <h2 class="add-panel__title" id="formHeading">Новий діагноз</h2>
        <div class="add-panel__divider"></div>
        <div class="add-panel__field">
          <label class="add-panel__label" id="labelDiagText" for="diagnosisSearch">Код МКХ-10</label>
          <div class="icd-picker" id="icdPicker">
            <input class="add-panel__input icd-picker__search" type="search" id="diagnosisSearch" autocomplete="off" spellcheck="false" />
            <div class="icd-picker__selected" id="diagnosisSelected" hidden>
              <div class="icd-picker__selected-inner">
                <span class="icd-picker__code" id="diagnosisSelectedCode"></span>
                <span class="icd-picker__title" id="diagnosisSelectedTitle"></span>
              </div>
              <button type="button" class="icd-picker__clear" id="diagnosisClearBtn" aria-label=""></button>
            </div>
            <div class="icd-picker__list" id="diagnosisDropdown" hidden role="listbox" aria-label=""></div>
          </div>
          <p class="add-panel__hint" id="icdHint"></p>
        </div>
        <div class="add-panel__field">
          <label class="add-panel__label" id="labelSeverity" for="severitySelect">Тяжкість</label>
          <select class="add-panel__select" id="severitySelect">
            <option value="Легке">Легке</option>
            <option value="Середнє" selected>Середнє</option>
            <option value="Важке">Важке</option>
            <option value="Критичне">Критичне</option>
          </select>
        </div>
        <p class="add-panel__msg" id="formMsg" hidden></p>
        <button class="add-panel__btn" id="submitBtn" type="button">Додати діагноз</button>
      </aside>
    </div>
  </main>

  <div class="modal-overlay" id="deleteDiagModal" hidden>
    <div class="modal">
      <h3 class="modal__title" id="deleteDiagModalTitle"></h3>
      <p class="modal__text" id="deleteDiagModalText"></p>
      <p class="modal__error" id="deleteDiagModalError" hidden></p>
      <div class="modal__actions">
        <button type="button" class="modal__btn modal__btn--cancel" id="deleteDiagCancelBtn"></button>
        <button type="button" class="modal__btn modal__btn--danger" id="deleteDiagConfirmBtn"></button>
      </div>
    </div>
  </div>

  <script src="../../js/lang.js?v=1"></script>
  <script src="../../js/api.js?v=2"></script>
  <script src="diagnoses.js?v=6"></script>
</body>
</html>
